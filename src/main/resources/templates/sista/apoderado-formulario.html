<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${modo == 'editar'} ? 'Editar apoderado' : 'Nuevo apoderado'">Apoderado - SISTA</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="theme-sista">
<div th:replace="layout/header :: header"></div>
<div class="app-shell">
    <div th:replace="layout/sidebar :: sidebar"></div>
    <main class="content">
        <section class="page-hero">
            <div>
                <span class="eyebrow">SISTA</span>
                <h1 th:text="${modo == 'editar'} ? 'Editar apoderado' : 'Nuevo apoderado'">Apoderado</h1>
                <p>Registro de datos familiares y contacto del estudiante.</p>
            </div>
            <a class="btn" th:href="@{/sista/apoderados}" style="background:rgba(255,255,255,.15);color:white">↩ Volver</a>
        </section>

        <div th:if="${error}" class="message message-error" th:text="${error}"></div>

        <div class="card">
            <form class="form" th:action="@{/sista/apoderados/guardar}" method="post">
                <input type="hidden" name="idApoderado" th:if="${apoderado != null and apoderado['id_apoderado'] != null}" th:value="${apoderado['id_apoderado']}">
                <div class="grid grid-2">
                    <div><label>DNI</label><input name="dni" th:value="${apoderado['dni']}" required pattern="\d{8}" maxlength="8" inputmode="numeric" title="DNI de 8 digitos"></div>
                    <div><label>Parentesco</label><select name="parentesco" required><option th:each="p : ${parentescos}" th:value="${p}" th:text="${p == 'APODERADO_LEGAL' ? 'APODERADO LEGAL' : p}" th:selected="${apoderado['parentesco'] == p}"></option></select></div>
                </div>
                <div class="grid grid-2"><div><label>Nombres</label><input name="nombres" th:value="${apoderado['nombres']}" required minlength="2" maxlength="100" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ ]{2,100}" title="Solo letras y espacios"></div><div><label>Apellidos</label><input name="apellidos" th:value="${apoderado['apellidos']}" required minlength="2" maxlength="100" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ ]{2,100}" title="Solo letras y espacios"></div></div>
                <div class="grid grid-3"><div><label>Telefono</label><input name="telefono" th:value="${apoderado['telefono']}" required pattern="9\d{8}" maxlength="9" inputmode="numeric" title="Telefono de 9 digitos que empieza con 9"></div><div><label>Email</label><input type="email" name="email" th:value="${apoderado['email']}" maxlength="100"></div><div><label>Direccion</label><input name="direccion" th:value="${apoderado['direccion']}" required minlength="5" maxlength="200"></div></div>
                <div class="actions">
                    <button class="btn" type="submit">Guardar</button>
                    <a class="btn btn-secondary" th:href="@{/sista/apoderados}">Cancelar</a>
                </div>
            </form>
        </div>
    </main>
</div>
<div th:replace="layout/footer :: footer"></div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
