<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Historial - EPIS</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body class="theme-objetos">
<div th:replace="layout/header :: header"></div>
<div class="app-shell">
    <div th:replace="layout/sidebar :: sidebar"></div>
    <main class="content">
        <section class="page-hero">
            <div>
                <span class="eyebrow">Objetos perdidos</span>
                <h1>Historial de objetos</h1>
                <p>Registro de acciones realizadas sobre los objetos perdidos.</p>
            </div>
            <a class="btn" th:href="@{/objetos}" style="background:rgba(255,255,255,.15);color:white">↩ Volver</a>
        </section>

        <div class="card" style="padding:0;overflow-x:auto">
            <table>
                <thead><tr><th>Fecha</th><th>Codigo</th><th>Objeto</th><th>Accion</th><th>Usuario responsable</th></tr></thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(historial)}">
                    <td colspan="5" class="muted" style="text-align:center;padding:24px">Todavia no hay acciones registradas.</td>
                </tr>
                <tr th:each="h : ${historial}">
                    <td th:text="${#temporals.format(h.fecha, 'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${h.objeto.codigo}"></td>
                    <td th:text="${h.objeto.nombreObjeto}"></td>
                    <td><span class="badge badge-role" th:text="${h.accion}"></span></td>
                    <td th:text="${h.usuario.nombreCompleto}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<div th:replace="layout/footer :: footer"></div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
