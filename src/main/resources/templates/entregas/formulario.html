<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Registrar entrega - EPIS</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body class="theme-objetos">
<div th:replace="layout/header :: header"></div>
<div class="app-shell">
    <div th:replace="layout/sidebar :: sidebar"></div>
    <main class="content">
        <section class="page-hero">
            <div>
                <span class="eyebrow">Objetos perdidos</span>
                <h1>Registrar entrega</h1>
                <p>Complete los datos del receptor del objeto.</p>
            </div>
            <a class="btn" th:href="@{/entregas}" style="background:rgba(255,255,255,.15);color:white">↩ Volver</a>
        </section>

        <div class="card">
            <h2 style="margin-top:0" th:text="${objeto.codigo + ' - ' + objeto.nombreObjeto}">Objeto</h2>
            <p><b>Descripcion:</b> <span th:text="${objeto.descripcion}"></span></p>
            <p><b>Ubicacion:</b> <span th:text="${objeto.ubicacionTexto}"></span></p>
        </div>

        <div class="card">
            <form class="form" th:action="@{/entregas/guardar}" th:object="${entrega}" method="post">
                <input type="hidden" name="idObjeto" th:value="${objeto.idObjeto}">
                <div class="grid grid-2">
                    <div><label>Tipo receptor</label><select th:field="*{tipoReceptor}" required>
                        <option value="Alumno">Alumno</option><option value="Docente">Docente</option><option value="Personal">Personal</option><option value="Externo">Externo</option>
                    </select></div>
                    <div><label>Documento receptor</label><input th:field="*{documentoReceptor}" placeholder="DNI o RUC" pattern="(\d{8}|\d{11})" title="DNI de 8 digitos o RUC de 11 digitos"></div>
                </div>
                <div class="grid grid-2">
                    <div><label>Nombre receptor</label><input th:field="*{nombreReceptor}" required minlength="2" maxlength="100" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ ]{2,100}" title="Solo letras y espacios"></div>
                    <div><label>Apellidos receptor</label><input th:field="*{apellidosReceptor}" required minlength="2" maxlength="100" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ ]{2,100}" title="Solo letras y espacios"></div>
                </div>
                <div class="grid grid-3">
                    <div><label>Codigo</label><input th:field="*{codigoEstudiante}" pattern="\d{10}" maxlength="10" inputmode="numeric" title="Codigo de estudiante de 10 digitos"></div>
                    <div><label>Telefono</label><input th:field="*{telefono}" pattern="9\d{8}" maxlength="9" inputmode="numeric" title="Telefono de 9 digitos que empieza con 9"></div>
                    <div><label>Email</label><input type="email" th:field="*{email}" maxlength="100"></div>
                </div>
                <div class="actions"><button class="btn btn-success" type="submit"> Confirmar entrega</button><a class="btn btn-secondary" th:href="@{/entregas}">Cancelar</a></div>
            </form>
        </div>
    </main>
</div>
<div th:replace="layout/footer :: footer"></div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
