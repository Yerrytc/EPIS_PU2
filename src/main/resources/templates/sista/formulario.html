<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${modo == 'editar'} ? 'Editar registro' : 'Nuevo registro'">Registro - SISTA</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="theme-sista">
<div th:replace="layout/header :: header"></div>
<div class="app-shell">
    <div th:replace="layout/sidebar :: sidebar"></div>
    <main class="content">
        <section class="page-hero">
            <div>
                <span class="eyebrow">SISTA</span>
                <h1 th:text="${modo == 'editar'} ? 'Editar registro' : 'Nuevo registro'">Registro</h1>
                <p>Complete la informacion solicitada.</p>
            </div>
            <a class="btn" th:href="@{/sista/registros}" style="background:rgba(255,255,255,.15);color:white">↩ Volver</a>
        </section>

        <div th:if="${error}" class="message message-error" th:text="${error}"></div>

        <div class="card">
            <form class="form" th:action="@{${formAction}}" method="post">
                <input type="hidden" name="id" th:value="${registro != null ? registro.id : null}">
                <div class="grid grid-2">
                    <div><label>Nombre</label><input name="nombre" th:value="${registro != null ? registro.nombre : ''}" required minlength="5" maxlength="255"></div>
                    <div><label>Fecha</label><input type="date" name="fecha" th:value="${registro != null ? registro.fecha : ''}" required></div>
                </div>
                <div><label>Descripcion</label><textarea name="descripcion" maxlength="1000" th:text="${registro != null ? registro.descripcion : ''}"></textarea></div>
                <div class="actions">
                    <button class="btn" type="submit">Guardar</button>
                    <a class="btn btn-secondary" th:href="@{/sista/registros}">Cancelar</a>
                </div>
            </form>
        </div>
    </main>
</div>
<div th:replace="layout/footer :: footer"></div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
