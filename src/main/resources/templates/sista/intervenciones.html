<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intervenciones - SISTA</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="theme-sista">
<div th:replace="layout/header :: header"></div>
<div class="app-shell">
    <div th:replace="layout/sidebar :: sidebar"></div>
    <main class="content">
        <section class="page-hero">
            <div>
                <span class="eyebrow">SISTA</span>
                <h1>Control de intervenciones</h1>
                <p>Filtrado por estado/tipo, registro, modificacion y seguimiento.</p>
            </div>
            <div class="actions">
                <a class="btn" th:href="@{/sista/intervenciones/nuevo}" style="background:rgba(255,255,255,.2);color:white"> Agregar</a>
                <a class="btn" th:href="@{/sista}" style="background:rgba(255,255,255,.15);color:white">↩ Volver</a>
            </div>
        </section>

        <div th:if="${ok}" class="message message-ok" th:text="${ok}"></div>
        <div th:if="${error}" class="message message-error" th:text="${error}"></div>

        <form class="sista-toolbar" th:action="@{/sista/intervenciones}" method="get">
            <div>
                <label>Estado</label>
                <select name="estado">
                    <option value="">-- Todos --</option>
                    <option th:each="e : ${estados}" th:value="${e['codigo']}" th:text="${e['nombre']}" th:selected="${estado != null and estado == e['codigo']}"></option>
                </select>
            </div>
            <div>
                <label>Tipo</label>
                <select name="idTipo">
                    <option value="">-- Todos --</option>
                    <option th:each="t : ${tipos}" th:value="${t['id_tipo']}" th:text="${t['nombre']}" th:selected="${idTipo != null and idTipo == t['id_tipo']}"></option>
                </select>
            </div>
            <div class="actions" style="align-self:end">
                <button class="btn" type="submit">Filtrar</button>
                <a class="btn btn-secondary" th:href="@{/sista/intervenciones}">Refrescar</a>
            </div>
        </form>

        <div class="card" style="padding:0;overflow-x:auto">
            <table>
                <thead><tr><th>ID</th><th>Codigo</th><th>Estudiante</th><th>Tipo</th><th>Fecha</th><th>Motivo</th><th>Responsable</th><th>Estado</th><th>Acciones</th></tr></thead>
                <tbody>
                <tr th:each="i : ${intervenciones}">
                    <td th:text="${i['id_intervencion']}"></td>
                    <td th:text="${i['codigo_estudiante']}"></td>
                    <td th:text="${i['nombre_estudiante']}"></td>
                    <td th:text="${i['nombre_tipo']}"></td>
                    <td th:text="${i['fecha']}"></td>
                    <td th:text="${i['motivo']}"></td>
                    <td th:text="${i['responsable']}"></td>
                    <td th:text="${i['estado_nombre']}"></td>
                    <td class="actions">
                        <a class="btn btn-light" th:href="@{/sista/intervenciones/editar/{id}(id=${i['id_intervencion']})}">Modificar</a>
                        <a class="btn btn-secondary" th:href="@{/sista/intervenciones/{id}/seguimiento(id=${i['id_intervencion']})}">Seguimiento</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(intervenciones)}"><td colspan="9">No se encontraron intervenciones.</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<div th:replace="layout/footer :: footer"></div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
