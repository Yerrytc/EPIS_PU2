# ============================================================
# EPIS - Configuracion LOCAL MySQL / MariaDB para HeidiSQL
# Modulos: SISTA, Objetos Perdidos, RSU y Tutoria
# ============================================================

spring.application.name=EPIS_PU2

# ============================================================
# MYSQL / MARIADB LOCAL
# HeidiSQL es el cliente; la BD local normalmente es MySQL/MariaDB.
# Por defecto usa:
#   Host: localhost
#   Puerto: 3306
#   Base de datos: bd_epis
#   Usuario: root
#   Password: (sin clave)
# Configurado para HeidiSQL local con usuario root sin clave.
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/bd_epis?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ============================================================
# JPA / HIBERNATE PARA MYSQL
# La estructura se crea con database/mysql/bd_epis.sql
# ============================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# THYMELEAF / RECURSOS
# Cache desactivado para desarrollo local.
# ============================================================
spring.thymeleaf.cache=false
spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.no-cache=true
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# ============================================================
# PUERTO LOCAL
# ============================================================
server.port=8087

# La BD se crea con database/mysql/bd_epis.sql
spring.sql.init.mode=never

# ============================================================
# SMTP / CORREO - opcional para pruebas locales
# Si no configuras correo real, el sistema igual abre y funciona.
# ============================================================
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
app.mail.from=${MAIL_FROM:noreply@upt.pe}

# ============================================================
# LOGIN DEMO LOCAL
# En local asegura que los usuarios demo siempre tengan clave 123456.
# Para nube/produccion cambiar a false.
# ============================================================
app.local.reset-demo-passwords=true
