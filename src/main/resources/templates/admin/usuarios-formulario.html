<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title th:text="${modo == 'editar'} ? 'Editar usuario' : 'Nuevo usuario'">Usuario - EPIS</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body class="theme-admin">
<div th:replace="layout/header :: header"></div>
<div class="app-shell">
    <div th:replace="layout/sidebar :: sidebar"></div>
    <main class="content">
        <section class="page-hero">
            <div>
                <span class="eyebrow">Administracion</span>
                <h1 th:text="${modo == 'editar'} ? 'Editar usuario' : 'Nuevo usuario'">Usuario</h1>
                <p>Complete los datos del usuario y su acceso institucional.</p>
            </div>
            <a class="btn" th:href="@{/admin/usuarios}" style="background:rgba(255,255,255,.15);color:white">вҶ© Volver</a>
        </section>

        <div class="message message-error" th:if="${error}" th:text="${error}"></div>

        <div class="card">
            <form class="form" th:object="${usuario}" th:action="@{${formAction}}" method="post" novalidate>
                <div class="grid grid-2">
                    <div>
                        <label>Nombres</label>
                        <input th:field="*{nombre}" required minlength="2" maxlength="50" pattern="[A-Za-zГҒГүГҚГ“ГҡГЎГ©ГӯГіГәГ‘Гұ ]{2,50}" title="Solo letras y espacios">
                    </div>
                    <div>
                        <label>Apellidos</label>
                        <input th:field="*{apellidos}" required minlength="2" maxlength="80" pattern="[A-Za-zГҒГүГҚГ“ГҡГЎГ©ГӯГіГәГ‘Гұ ]{2,80}" title="Solo letras y espacios">
                    </div>
                </div>

                <div class="grid grid-2">
                    <div>
                        <label>Rol</label>
                        <select id="selectRol" th:field="*{tipoUsuario}" required onchange="toggleCodigoAlumno()">
                            <option value="ADMIN">Administrador</option>
                            <option value="TUTOR">Tutor</option>
                            <option value="DOCENTE">Docente</option>
                            <option value="ALUMNO">Alumno</option>
                        </select>
                    </div>
                    <div id="divCodigoAlumno">
                        <label>Codigo alumno</label>
                        <input th:field="*{codigoAlumno}" placeholder="Ejemplo: 2023078888" pattern="\d{10}" maxlength="10" inputmode="numeric" title="Debe tener exactamente 10 digitos">
                    </div>
                </div>

                <div class="grid grid-3">
                    <div>
                        <label>DNI / Documento</label>
                        <input th:field="*{documento}" required pattern="\d{8}" maxlength="8" inputmode="numeric" title="Debe tener exactamente 8 digitos">
                    </div>
                    <div>
                        <label>Telefono</label>
                        <input th:field="*{telefono}" required pattern="9\d{8}" maxlength="9" inputmode="numeric" title="Debe tener exactamente 9 digitos y empezar con 9">
                    </div>
                    <div>
                        <label>Email institucional</label>
                        <input type="email" th:field="*{email}" placeholder="usuario@virtual.upt.pe" pattern="^[A-Za-z0-9._%+-]+@virtual\.upt\.pe$" required title="Debe terminar en @virtual.upt.pe">
                    </div>
                </div>

                <div class="grid grid-2">
                    <div>
                        <label>Correo de acceso</label>
                        <input name="username" th:value="${usuario.login != null ? usuario.login.username : usuario.email}" placeholder="usuario@virtual.upt.pe" pattern="^[A-Za-z0-9._%+-]+@virtual\.upt\.pe$" required title="Debe terminar en @virtual.upt.pe">
                    </div>
                    <div>
                        <label th:text="${modo == 'editar'} ? 'Nueva contrasena (opcional)' : 'Contrasena'">Contrasena</label>
                        <input name="password" type="password" th:required="${modo == 'nuevo'}" minlength="6" placeholder="Minimo 6 caracteres">
                    </div>
                </div>

                <div class="message message-error" id="formErrors" style="display:none"></div>
                <div class="actions"><button class="btn" type="submit">Guardar</button><a class="btn btn-secondary" th:href="@{/admin/usuarios}">Cancelar</a></div>
            </form>
        </div>
    </main>
</div>
<div th:replace="layout/footer :: footer"></div>
<script th:src="@{/js/app.js}"></script>
<script>
function toggleCodigoAlumno() {
  var rol = document.getElementById('selectRol').value;
  var div = document.getElementById('divCodigoAlumno');
  var input = document.querySelector('#divCodigoAlumno input');
  if (rol === 'ALUMNO') {
    div.style.display = 'block';
    input.required = true;
  } else {
    div.style.display = 'none';
    input.required = false;
    input.value = '';
  }
}
toggleCodigoAlumno();

function onlyDigits(value) { return /^\d+$/.test(value || ''); }
function institutionalEmail(value) { return /^[A-Za-z0-9._%+-]+@virtual\.upt\.pe$/.test((value || '').trim().toLowerCase()); }

document.querySelector('form').addEventListener('submit', function(e) {
  var errors = [];
  var nombre = document.querySelector('[name="nombre"]');
  var apellidos = document.querySelector('[name="apellidos"]');
  var documento = document.querySelector('[name="documento"]');
  var telefono = document.querySelector('[name="telefono"]');
  var email = document.querySelector('[name="email"]');
  var username = document.querySelector('[name="username"]');
  var password = document.querySelector('[name="password"]');
  var rol = document.getElementById('selectRol').value;
  var codigo = document.querySelector('[name="codigoAlumno"]');

  if (!nombre.value.trim().match(/^[A-Za-zГҒГүГҚГ“ГҡГЎГ©ГӯГіГәГ‘Гұ ]{2,50}$/)) errors.push('Los nombres solo deben tener letras y espacios.');
  if (!apellidos.value.trim().match(/^[A-Za-zГҒГүГҚГ“ГҡГЎГ©ГӯГіГәГ‘Гұ ]{2,80}$/)) errors.push('Los apellidos solo deben tener letras y espacios.');
  if (!onlyDigits(documento.value) || documento.value.length !== 8) errors.push('El DNI/documento debe tener exactamente 8 digitos.');
  if (!onlyDigits(telefono.value) || telefono.value.length !== 9) errors.push('El telefono debe tener exactamente 9 digitos.');
  if (!institutionalEmail(email.value)) errors.push('El email institucional debe terminar en @virtual.upt.pe.');
  if (!institutionalEmail(username.value)) errors.push('El correo de acceso debe terminar en @virtual.upt.pe.');
  if (rol === 'ALUMNO' && (!onlyDigits(codigo.value) || codigo.value.length !== 10)) errors.push('El codigo de alumno debe tener exactamente 10 digitos.');
  if (password.required && !password.value.trim()) errors.push('Debe ingresar una contrasena.');
  if (password.value && password.value.length < 6) errors.push('La contrasena debe tener minimo 6 caracteres.');

  var box = document.getElementById('formErrors');
  if (errors.length > 0) {
    e.preventDefault();
    box.style.display = 'block';
    box.innerHTML = errors.map(function(x){ return 'вҖў ' + x; }).join('<br>');
    window.scrollTo({ top: box.offsetTop - 100, behavior: 'smooth' });
  } else {
    box.style.display = 'none';
  }
});
</script>
</body>
</html>
